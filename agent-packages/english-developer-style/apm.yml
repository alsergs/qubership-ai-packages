name: english-developer-style
version: 2.0.0
description: Compatibility alias for the original package name. Resolves to english-us-developer-style, so the bare name now defaults to American English; depend on english-uk-developer-style for British English. Carries no skill of its own.
author: Qubership

# Backward-compatibility shim: keep the old name resolvable and point it
# at a concrete dialect. The default moved from British to American with
# the dialect split, hence the major-version bump.
#
# Published marketplace packages are installed as remote packages, so they
# cannot depend on sibling packages with filesystem-relative paths. Keep this
# pinned to a commit with the trimmed english-us-developer-style description.
dependencies:
  apm:
    - Netcracker/qubership-ai-packages/agent-packages/english-us-developer-style#0453aca8531265db34d1299519dd5c8dbde1f307
